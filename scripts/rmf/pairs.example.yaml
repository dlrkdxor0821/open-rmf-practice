# 대응점 예시 — fix_navgraph.py 입력용
#
#   src: 현재(틀린) navgraph 좌표   (rviz 에서 waypoint 가 떠 있는 위치)
#   dst: 가제보에서 있어야 할 실좌표 (그 점이 실제 벽/통로 기준 어디여야 하는지)
#
# 규칙:
#   - 최소 2쌍. 서로 멀리 떨어진 점일수록 정확.
#   - 3쌍 이상 주면 RMS 잔차로 평균 오차를 줄여줌.
#
# 아래 값은 형식 예시일 뿐이니 실제 측정값으로 교체할 것.
- src: [10.0, -8.0]
  dst: [-5.929, 14.567]
- src: [25.0, -30.0]
  dst: [1.5, 2.0]
